services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with PostGIS extension
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:15-3.3
    container_name: paraglide_postgres
    environment:
      POSTGRES_USER: paraglide
      POSTGRES_PASSWORD: paraglide
      POSTGRES_DB: paraglide_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paraglide -d paraglide_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis for caching and task queuing
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: paraglide_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paraglide_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://paraglide:paraglide@postgres:5432/paraglide_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload"

  # ---------------------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    container_name: paraglide_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
